monitor.alsa.rules = [
  {
    matches = [ { device.name = "alsa_card.pci-0000_00_1f.3-platform-sof_sdw" } ]
    actions = { update-props = { device.description = "Audio" } }
  }
  {
    matches = [ { node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.HiFi__Speaker__sink" } ]
    actions = { update-props = { node.description = "Speaker", node.nick = "Speaker" } }
  }
  {
    matches = [ { node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.HiFi__Headphones__sink" } ]
    actions = { update-props = { node.description = "Headphones", node.nick = "Headphones" } }
  }
  {
    matches = [ { node.name = "alsa_input.pci-0000_00_1f.3-platform-sof_sdw.HiFi__Mic__source" } ]
    actions = { update-props = { node.description = "Microphone", node.nick = "Microphone" } }
  }
  {
    matches = [ { node.name = "alsa_input.pci-0000_00_1f.3-platform-sof_sdw.HiFi__Headset__source" } ]
    actions = { update-props = { node.description = "Headset Microphone", node.nick = "Headset Mic" } }
  }
  {
    matches = [ { node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.HiFi__HDMI1__sink" } ]
    actions = { update-props = { node.description = "DisplayPort 1 Output", node.nick = "DP 1" } }
  }
  {
    matches = [ { node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.HiFi__HDMI2__sink" } ]
    actions = { update-props = { node.description = "DisplayPort 2 Output", node.nick = "DP 2" } }
  }
  {
    matches = [ { node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.HiFi__HDMI3__sink" } ]
    actions = { update-props = { node.description = "DisplayPort 3 Output", node.nick = "DP 3" } }
  }
]
